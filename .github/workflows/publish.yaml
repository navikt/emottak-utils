name: "Publish emottak-utils library"
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.2.3 or v1.2.3)"
        required: false
        default: ""
jobs:
  build:
    name: "build"
    runs-on: "ubuntu-24.04"
    permissions: 
        packages: write
        repository-projects: write
        contents: write
    steps:
    - uses: "actions/checkout@v6"
    - uses: "actions/setup-java@v5"
      with:
        "java-version": "21"
        "distribution": "temurin"
    - name: Set release version
      run: |
        RAW="${{ github.event.release.tag_name || github.event.inputs.version }}"
        VERSION="${RAW#v}"
        echo "RELEASE_VERSION=${VERSION}" >> $GITHUB_ENV
    - name: Cache Gradle
      uses: actions/cache@v5
      with:
        path: |
          ~/.gradle/wrapper
          ~/.gradle/caches
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/gradle.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    - name: "Build and tests"
      run: ./gradlew test build
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_USERNAME: x-access-token
        RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
    - name: Publish emottak-utils
      run: ./gradlew --stacktrace publish
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_USERNAME: x-access-token
        RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
