version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Europe/Oslo"
    cooldown:
      default-days: 3
    open-pull-requests-limit: 3
    
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Europe/Oslo"
    cooldown:
      default-days: 3
    open-pull-requests-limit: 3
    
